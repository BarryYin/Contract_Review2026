# ============================================================
# ContractAI — 预置合规审查规则 (T-CE-01)
# 7 条预置规则，供规则引擎加载使用
# ============================================================

rules:
  # ----------------------------------------------------------
  # Rule 1: 违约金比例上限
  # ----------------------------------------------------------
  - name: "违约金比例上限"
    description: >
      检查合同中的违约金（滞纳金、赔偿金）约定是否超过实际损失的 30%，
      超出部分可能被法院认定为过高而予以调整。
    severity: high
    contract_types:
      - "采购合同"
      - "服务合同"
      - "劳动合同"
      - "租赁合同"
      - "建设工程合同"
    legal_basis: "《中华人民共和国民法典》第585条：约定的违约金超过造成损失的百分之三十的，一般可以认定为过分高于造成的损失。"
    check_type: both
    check_config:
      keyword:
        keywords:
          - "违约金"
          - "滞纳金"
          - "赔偿金"
          - "罚金"
          - "违约责任"
        logic: "any"
      regex:
        pattern: "违约[金罚].*?(\\d{1,3})[%％]"
      semantic:
        description: >
          审查合同中关于违约金、滞纳金或赔偿金的条款，判断约定的违约金比例是否超过
          实际损失的 30%。重点关注：1) 是否明确约定了具体的违约金比例或金额；
          2) 该比例是否可能超过损失的 30%；3) 是否存在"按日千分之X"等累计式违约金
          条款（累计后可能远超 30%）。
    risk_description_template: "合同第 {section} 条约定的违约金比例（{percentage}）可能超过民法典第585条规定的损失30%上限，存在被法院调整的风险。建议将违约金比例控制在损失的30%以内。"

  # ----------------------------------------------------------
  # Rule 2: 付款周期超过60天
  # ----------------------------------------------------------
  - name: "付款周期超过60天"
    description: >
      检查合同中约定的付款周期是否超过60天。付款周期过长可能导致资金占用风险，
      需额外标注提示。
    severity: medium
    contract_types:
      - "采购合同"
      - "服务合同"
      - "租赁合同"
      - "建设工程合同"
    legal_basis: "《保障中小企业款项支付条例》第8条：机关、事业单位从中小企业采购货物、工程、服务，应当自货物、工程、服务交付之日起30日内支付款项；合同另有约定的，付款期限最长不得超过60日。"
    check_type: both
    check_config:
      keyword:
        keywords:
          - "付款"
          - "支付"
          - "结算"
          - "账期"
          - "验收后"
          - "交付后"
          - "收到发票后"
        logic: "any"
      regex:
        pattern: "(?:付款|支付|结算).{0,20}?(\\d{2,3})\\s*[天日]"
      semantic:
        description: >
          审查合同中关于付款时间的约定，判断付款周期是否超过60天。重点关注：
          1) 付款条件与时间的具体约定；2) 是否存在"验收合格后XX天付款"等条款；
          3) 分期付款情况下每期间隔是否合理；4) 是否对付款方的付款义务设定了
          不合理的前提条件从而变相延长付款周期。
    risk_description_template: "合同第 {section} 条约定的付款周期（{days}天）超过60天，存在资金占用风险。根据《保障中小企业款项支付条例》，建议将付款周期控制在60天以内。"

  # ----------------------------------------------------------
  # Rule 3: 保密期限缺失或过短
  # ----------------------------------------------------------
  - name: "保密期限缺失或过短"
    description: >
      检查合同中是否包含保密条款及其约定期限。保密期限少于2年或缺失保密条款
      均视为风险。
    severity: medium
    contract_types:
      - "all"
    legal_basis: "《中华人民共和国反不正当竞争法》第9条及相关司法解释：商业秘密的保护应当有合理的保密措施和期限约定。"
    check_type: both
    check_config:
      keyword:
        keywords:
          - "保密"
          - "商业秘密"
          - "技术秘密"
          - "保密义务"
          - "保密期限"
          - "保密协议"
          - "不泄露"
        logic: "any"
      regex:
        pattern: "保密.{0,30}?(\\d{1,2})\\s*[年月]"
      semantic:
        description: >
          审查合同中的保密条款，判断保密期限是否合理。重点关注：1) 是否存在保密条款；
          2) 保密期限是否明确约定；3) 保密期限是否少于2年；4) 是否存在"合同终止后
          保密义务自动失效"等对保密方不利的表述。若无保密条款或保密期限不足2年，
          应予以提示。
    risk_description_template: "合同{section} {issue_type}。保密期限（{duration}）{risk_detail}，可能导致商业秘密保护不充分。建议设定不少于2年的保密期限。"

  # ----------------------------------------------------------
  # Rule 4: 争议解决条款不明确
  # ----------------------------------------------------------
  - name: "争议解决条款不明确"
    description: >
      检查合同中的争议解决条款是否明确约定了仲裁机构或管辖法院所在地。
      模糊的争议解决条款可能导致维权困难。
    severity: high
    contract_types:
      - "all"
    legal_basis: "《中华人民共和国民事诉讼法》第34条及《中华人民共和国仲裁法》第16条：仲裁协议应当具备请求仲裁的意思表示、仲裁事项和选定的仲裁委员会。协议管辖应当约定具体的管辖法院。"
    check_type: both
    check_config:
      keyword:
        keywords:
          - "争议解决"
          - "纠纷"
          - "仲裁"
          - "诉讼"
          - "管辖"
          - "法院"
        logic: "any"
      regex:
        pattern: "(?:争议|纠纷).{0,50}?(协商|调解|仲裁|诉讼|管辖)"
      semantic:
        description: >
          审查合同中的争议解决条款，判断争议解决方式是否明确。重点关注：
          1) 是否约定了争议解决方式（仲裁或诉讼）；2) 如选择仲裁，是否明确约定了
          具体的仲裁委员会名称；3) 如选择诉讼，是否明确约定了管辖法院所在地；
          4) 是否存在"由双方另行协商解决"等模糊表述而无兜底方案；5) 仲裁与诉讼
          条款是否存在冲突（即"或裁或审"问题）。
    risk_description_template: "合同第 {section} 条的争议解决条款{issue_detail}，可能导致争议发生时维权困难。建议明确约定仲裁机构全称或管辖法院所在地。"

  # ----------------------------------------------------------
  # Rule 5: 知识产权工作成果范围不清晰
  # ----------------------------------------------------------
  - name: "知识产权工作成果范围不清晰"
    description: >
      检查合同中对知识产权及工作成果的归属、使用范围、转让条件等是否作出了
      清晰明确的约定。
    severity: high
    contract_types:
      - "服务合同"
      - "技术开发合同"
      - "委托合同"
      - "合作合同"
    legal_basis: "《中华人民共和国著作权法》第19条及《中华人民共和国专利法》第8条：委托创作或合作发明完成的成果，权属由合同约定；合同未约定的，相关权利归属于创作者或合作方共有。"
    check_type: both
    check_config:
      keyword:
        keywords:
          - "知识产权"
          - "著作权"
          - "专利"
          - "商标"
          - "版权"
          - "工作成果"
          - "交付物"
          - "所有权"
          - "使用权"
          - "归属"
        logic: "any"
      regex:
        pattern: "(?:知识产权|著作权|专利|商标|工作成果|交付物).{0,30}?(归属|所有|转让|许可|使用)"
      semantic:
        description: >
          审查合同中关于知识产权及工作成果的条款，判断权属约定是否清晰明确。
          重点关注：1) 是否明确约定了工作成果的知识产权归属；2) 是否区分了
          前景知识产权和背景知识产权；3) 是否约定了知识产权的使用范围和限制；
          4) 是否约定了知识产权的转让或许可条件；5) 是否存在"所有成果归甲方所有"
          等笼统表述而未界定成果范围。
    risk_description_template: "合同第 {section} 条对知识产权/工作成果的约定{issue_detail}，可能导致后续权属争议。建议明确约定各类工作成果的知识产权归属、使用范围及转让条件。"

  # ----------------------------------------------------------
  # Rule 6: 免责条款单方面不对等保护
  # ----------------------------------------------------------
  - name: "免责条款单方面不对等保护"
    description: >
      检查合同中的免责条款是否存在仅保护一方利益、加重另一方责任的不对等情况。
    severity: high
    contract_types:
      - "all"
    legal_basis: "《中华人民共和国民法典》第497条：提供格式条款一方不合理地免除或者减轻其责任、加重对方责任、限制对方主要权利的，该条款无效。第506条：合同中的下列免责条款无效——造成对方人身损害的，因故意或者重大过失造成对方财产损失的。"
    check_type: both
    check_config:
      keyword:
        keywords:
          - "免责"
          - "不承担责任"
          - "免除责任"
          - "不可抗力"
          - "不承担赔偿"
          - "损失由"
          - "风险承担"
        logic: "any"
      regex:
        pattern: "(?:免责|不承担|免除).{0,50}?(责任|赔偿|损失)"
      semantic:
        description: >
          审查合同中的免责条款，判断是否存在权利义务不对等的情形。重点关注：
          1) 免责条款是否仅免除某一方的责任而未对等免除另一方；2) 是否存在
          "任何情况下乙方不得向甲方主张赔偿"等绝对免责表述；3) 不可抗力条款是否
          对双方平等适用；4) 是否存在将不可抗力以外的风险也纳入免责范围的情形；
          5) 违约责任的承担是否对双方均等适用。
    risk_description_template: "合同第 {section} 条的免责条款{issue_detail}，存在权利义务不对等的问题。根据民法典第497条，该类条款可能被认定为无效。建议确保免责条款对双方平等适用。"

  # ----------------------------------------------------------
  # Rule 7: 终止条款赋予一方无条件单方解除权
  # ----------------------------------------------------------
  - name: "终止条款赋予一方无条件单方解除权"
    description: >
      检查合同终止条款中是否存在赋予一方无条件的单方解除权，而另一方
      须满足特定条件方可解除的不对等情形。
    severity: high
    contract_types:
      - "all"
    legal_basis: "《中华人民共和国民法典》第562条：当事人协商一致，可以解除合同。当事人可以约定一方解除合同的事由。第563条：有下列情形之一的，当事人可以解除合同——因不可抗力致使不能实现合同目的等。单方解除权的赋予应当遵循公平原则。"
    check_type: both
    check_config:
      keyword:
        keywords:
          - "解除"
          - "终止"
          - "提前终止"
          - "单方解除"
          - "随时终止"
          - "提前通知"
          - "无条件终止"
          - "自行终止"
        logic: "any"
      regex:
        pattern: "(?:单方|随时|自行|有权).{0,15}?(解除|终止).{0,30}?(无需|不必|无条件|提前通知)"
      semantic:
        description: >
          审查合同中的终止/解除条款，判断是否存在不对等的单方解除权。重点关注：
          1) 是否存在"甲方有权随时解除合同"等无条件单方解除权；2) 该权利是否仅
          赋予合同一方；3) 解除权的行使条件是否对双方均等；4) 单方解除时是否约定了
          合理的通知期限和补偿机制；5) 是否存在一方仅需"提前X天通知"即可解除而
          另一方须承担违约责任的情形。
    risk_description_template: "合同第 {section} 条{issue_detail}，该等条款赋予一方无条件的单方解除权，违反了合同法的公平原则。建议为双方设定对等的解除条件和合理的通知期限。"
